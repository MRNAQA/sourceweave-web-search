name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example vX.Y.Z. Must match pyproject.toml version."
        required: true
        type: string
      release_name:
        description: "Optional GitHub release title. Defaults to the tag."
        required: false
        type: string
      target_ref:
        description: "Branch or commit to tag and release. Usually main."
        required: true
        default: "main"
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: true
        default: false
        type: boolean
      publish_pypi:
        description: "Publish the built wheel and sdist to PyPI using trusted publishing."
        required: true
        default: false
        type: boolean
      publish_ghcr:
        description: "Publish the container image to GitHub Container Registry."
        required: true
        default: false
        type: boolean
      publish_dockerhub:
        description: "Publish the container image to Docker Hub. Requires Docker Hub secrets."
        required: true
        default: false
        type: boolean
      changelog:
        description: "Markdown release notes/changelog for this release."
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      UV_LINK_MODE: copy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Verify tag matches project version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${{ inputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "Expected release tag $EXPECTED_TAG but got ${{ inputs.tag }}" >&2
            exit 1
          fi

      - name: Install project dependencies
        run: uv sync --locked --group dev

      - name: Check release metadata sync
        run: uv run python scripts/sync_release_metadata.py --check

      - name: Check OpenWebUI artifact drift
        run: uv run sourceweave-build-openwebui --check

      - name: Run lint checks
        run: uv run ruff check src tests

      - name: Run type checks
        run: uv run mypy

      - name: Run deterministic packaging and runtime tests
        run: uv run pytest tests/test_config.py tests/test_packaging.py tests/test_tool.py -m "not integration"

      - name: Build release distributions
        run: uv build --no-sources --sdist --wheel --out-dir dist/release --clear --no-create-gitignore

      - name: Smoke build Docker image
        if: ${{ inputs.publish_ghcr || inputs.publish_dockerhub }}
        run: docker build -t sourceweave-web-search-mcp:release .

      - name: Derive release metadata
        id: release_meta
        shell: bash
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ inputs.tag }}"
          VERSION="${TAG_NAME#v}"
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sourceweave-web-search-mcp"
          DOCKERHUB_IMAGE="$DOCKERHUB_REPOSITORY"
          if [ -z "$DOCKERHUB_IMAGE" ]; then
            DOCKERHUB_IMAGE="mrnaqa/sourceweave-web-search-mcp"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=$GHCR_IMAGE" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=$DOCKERHUB_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Publish package to PyPI
        if: ${{ inputs.publish_pypi }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/release
          skip-existing: true

      - name: Set up Docker Buildx
        if: ${{ inputs.publish_ghcr || inputs.publish_dockerhub }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.publish_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Docker Hub credentials
        if: ${{ inputs.publish_dockerhub }}
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"

      - name: Log in to Docker Hub
        if: ${{ inputs.publish_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute container tags
        if: ${{ inputs.publish_ghcr || inputs.publish_dockerhub }}
        id: container_tags
        shell: bash
        run: |
          set -euo pipefail
          TAGS=()
          if [ "${{ inputs.publish_ghcr }}" = "true" ]; then
            TAGS+=("${{ steps.release_meta.outputs.ghcr_image }}:${{ steps.release_meta.outputs.version }}")
            TAGS+=("${{ steps.release_meta.outputs.ghcr_image }}:latest")
          fi
          if [ "${{ inputs.publish_dockerhub }}" = "true" ]; then
            TAGS+=("${{ steps.release_meta.outputs.dockerhub_image }}:${{ steps.release_meta.outputs.version }}")
            TAGS+=("${{ steps.release_meta.outputs.dockerhub_image }}:latest")
          fi
          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish container image
        if: ${{ inputs.publish_ghcr || inputs.publish_dockerhub }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.container_tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=sourceweave-web-search-mcp
            org.opencontainers.image.description=Fully local MCP server and CLI for web research
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release_meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum artifacts/sourceweave_web_search.py server.json dist/release/* > dist/release/SHA256SUMS.txt

      - name: Write release notes
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: printf '%s\n' "$CHANGELOG" > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
          TARGET_REF: ${{ inputs.target_ref }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE="$RELEASE_NAME"
          if [ -z "$TITLE" ]; then
            TITLE="$TAG_NAME"
          fi
          RELEASE_ARGS=()
          if [ "$PRERELEASE" = "true" ]; then
            RELEASE_ARGS+=(--prerelease)
          fi
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md \
              "${RELEASE_ARGS[@]}"
            gh release upload "$TAG_NAME" \
              --clobber \
              artifacts/sourceweave_web_search.py \
              server.json \
              dist/release/*
          else
            gh release create "$TAG_NAME" \
              --target "$TARGET_REF" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md \
              "${RELEASE_ARGS[@]}" \
              artifacts/sourceweave_web_search.py \
              server.json \
              dist/release/*
          fi
