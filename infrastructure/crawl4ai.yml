services:
  crawl4ai:
    image: "${CRAWL4AI_IMAGE:-unclecode/crawl4ai:0.8.6}"
    ports:
      - "19235:11235"
    environment:
      CRAWL4AI_API_TOKEN: "${CRAWL4AI_API_TOKEN:-sourceweave-local-crawl4ai-token-change-before-exposing}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11235/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
