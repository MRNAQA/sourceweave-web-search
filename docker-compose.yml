name: sourceweave-web-search

include:
  - infrastructure/redis.yml
  - infrastructure/crawl4ai.yml
  - infrastructure/searxng.yml

services:
  mcp:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
    environment:
      HOME: /tmp
      CRAWL4_AI_BASE_DIRECTORY: /tmp
      UV_LINK_MODE: copy
      UV_CACHE_DIR: /tmp/uv-cache
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
    depends_on:
      redis:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      searxng:
        condition: service_healthy
    command: ["uv", "run", "sourceweave-search-mcp", "--transport", "streamable-http"]
    ports:
      - "18000:8000"
    restart: unless-stopped
