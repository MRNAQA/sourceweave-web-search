name: web-research-studio

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    ports:
      - "3300:8080"
    environment:
      WEBUI_SECRET_KEY: "dev-change-me"
      WEBUI_AUTH: "false"
      ENABLE_OLLAMA_API: "false"
      ENABLE_OPENAI_API: "false"
      REDIS_URL: "redis://redis:6379/0"
      ENABLE_WEBSOCKET_SUPPORT: "true"
      WEBSOCKET_MANAGER: "redis"
      WEBSOCKET_REDIS_URL: "redis://redis:6379/1"
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: "searxng"
      WEB_SEARCH_RESULT_COUNT: "10"
      WEB_SEARCH_CONCURRENT_REQUESTS: "10"
      WEB_SEARCH_TRUST_ENV: "false"
      SEARXNG_QUERY_URL: "http://searxng:8080/search?q=<query>"
      SEARXNG_LANGUAGE: "all"
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      searxng:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web-research-studio-net

  openwebui-bootstrap:
    image: python:3.12-slim
    volumes:
      - ./scripts/bootstrap_openwebui.py:/app/bootstrap_openwebui.py:ro
      - ./web_research_tool.py:/app/web_research_tool.py:ro
    environment:
      OPENWEBUI_BASE_URL: "http://openwebui:8080"
      OPENWEBUI_TOOL_ID: "web_research_tool"
      OPENWEBUI_TOOL_NAME: "Web Research Studio"
      OPENWEBUI_ADMIN_EMAIL: "admin@localhost"
      OPENWEBUI_ADMIN_PASSWORD: "admin"
    depends_on:
      openwebui:
        condition: service_healthy
    command: ["python", "/app/bootstrap_openwebui.py"]
    restart: "no"
    networks:
      - web-research-studio-net

  redis:
    image: valkey/valkey:8.0.1-alpine
    command: "valkey-server --save 30 1 --maxclients 10000 --timeout 1800"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      start_period: 5s
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - web-research-studio-net

  crawl4ai:
    image: unclecode/crawl4ai:latest
    ports:
      - "19235:11235"
    environment:
      CRAWL4AI_API_TOKEN: "dev-change-me"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11235/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - web-research-studio-net

  searxng:
    image: searxng/searxng:latest
    ports:
      - "19080:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /etc/searxng/settings.yml ]; then
          grep -q '\- json' /etc/searxng/settings.yml || sed -i '/^  formats:/a\    - json' /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    environment:
      SEARXNG_SECRET: "dev-change-me"
      SEARXNG_LIMITER: "false"
      SEARXNG_IMAGE_PROXY: "false"
    volumes:
      - searxng-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - web-research-studio-net

volumes:
  openwebui-data:
  redis-data:
  searxng-config:
  searxng-cache:

networks:
  web-research-studio-net:
    driver: bridge
