name: sourceweave-web-search

include:
  - infrastructure/redis.yml
  - infrastructure/crawl4ai.yml
  - infrastructure/searxng.yml

services:
  mcp:
    image: sourceweave-web-search-mcp:local
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FASTMCP_HOST: "${FASTMCP_HOST:-0.0.0.0}"
      FASTMCP_PORT: "${FASTMCP_PORT:-8000}"
      SOURCEWEAVE_SEARCH_SEARXNG_BASE_URL: "${SOURCEWEAVE_SEARCH_SEARXNG_BASE_URL:-http://searxng:8080/search?format=json&q=<query>}"
      SOURCEWEAVE_SEARCH_CRAWL4AI_BASE_URL: "${SOURCEWEAVE_SEARCH_CRAWL4AI_BASE_URL:-http://crawl4ai:11235}"
      SOURCEWEAVE_SEARCH_CACHE_REDIS_URL: "${SOURCEWEAVE_SEARCH_CACHE_REDIS_URL:-redis://redis:6379/2}"
    depends_on:
      redis:
        condition: service_healthy
      crawl4ai:
        condition: service_healthy
      searxng:
        condition: service_healthy
    ports:
      - "18000:8000"
    restart: unless-stopped
