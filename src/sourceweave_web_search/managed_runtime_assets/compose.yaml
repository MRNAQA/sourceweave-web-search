services:
  redis:
    image: "${SOURCEWEAVE_MANAGED_RUNTIME_REDIS_IMAGE:-valkey/valkey:9-alpine}"
    command: "valkey-server --save 30 1 --maxclients 10000 --timeout 1800"
    ports:
      - "${SOURCEWEAVE_MANAGED_RUNTIME_REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      start_period: 5s
      interval: 10s
      timeout: 3s
      retries: 5

  crawl4ai:
    image: "${SOURCEWEAVE_MANAGED_RUNTIME_CRAWL4AI_IMAGE:-unclecode/crawl4ai:0.8.6}"
    ports:
      - "${SOURCEWEAVE_MANAGED_RUNTIME_CRAWL4AI_HOST_PORT:-19235}:11235"
    environment:
      CRAWL4AI_API_TOKEN: "${CRAWL4AI_API_TOKEN:-sourceweave-local-crawl4ai-token-change-before-exposing}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11235/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  searxng:
    image: "${SOURCEWEAVE_MANAGED_RUNTIME_SEARXNG_IMAGE:-searxng/searxng:2026.4.11-9e08a6771}"
    ports:
      - "${SOURCEWEAVE_MANAGED_RUNTIME_SEARXNG_HOST_PORT:-19080}:8080"
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -f /etc/searxng/settings.yml ]; then
          grep -q '\- json' /etc/searxng/settings.yml || sed -i '/^  formats:/a\    - json' /etc/searxng/settings.yml
        fi
        exec /usr/local/searxng/entrypoint.sh
    environment:
      SEARXNG_SECRET: "${SEARXNG_SECRET:-sourceweave-local-searxng-secret-change-before-exposing}"
      SEARXNG_LIMITER: "false"
      SEARXNG_IMAGE_PROXY: "false"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng-cache:/var/cache/searxng
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis-data:
  searxng-cache:
